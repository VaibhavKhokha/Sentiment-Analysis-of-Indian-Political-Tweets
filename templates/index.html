<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Political Tweet Sentiment Analysis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            color: #00d4ff;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .card h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #1a1a2e;
            color: #fff;
            font-size: 16px;
            resize: none;
        }
        textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
        }
        .positive { background: rgba(0,200,83,0.3); border: 2px solid #00c853; }
        .neutral { background: rgba(158,158,158,0.3); border: 2px solid #9e9e9e; }
        .negative { background: rgba(244,67,54,0.3); border: 2px solid #f44336; }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .stat-box {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
        }
        .stat-box.positive { background: rgba(0,200,83,0.2); }
        .stat-box.neutral { background: rgba(158,158,158,0.2); }
        .stat-box.negative { background: rgba(244,67,54,0.2); }
        .stat-box .number { font-size: 2em; font-weight: bold; }
        .stat-box .label { color: #888; font-size: 0.9em; }
        .loading { color: #00d4ff; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Political Tweet Sentiment Analysis</h1>
        <p class="subtitle">Powered by BERT Deep Learning Model</p>

        <div class="card">
            <h2>Analyze Tweet Sentiment</h2>
            <textarea id="tweetInput" placeholder="Enter a political tweet here..."></textarea>
            <button onclick="analyzeTweet()">Analyze Sentiment</button>
            <div id="result"></div>
        </div>

        <div class="card">
            <h2>Dataset Statistics</h2>
            <div class="stats" id="stats">
                <div class="stat-box positive">
                    <div class="number" id="posCount">-</div>
                    <div class="label">Positive Tweets</div>
                </div>
                <div class="stat-box neutral">
                    <div class="number" id="neuCount">-</div>
                    <div class="label">Neutral Tweets</div>
                </div>
                <div class="stat-box negative">
                    <div class="number" id="negCount">-</div>
                    <div class="label">Negative Tweets</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function analyzeTweet() {
            const tweet = document.getElementById('tweetInput').value;
            const resultDiv = document.getElementById('result');
            
            if (!tweet.trim()) {
                resultDiv.innerHTML = '<div class="result neutral">Please enter a tweet!</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="result neutral"><span class="loading">Analyzing...</span></div>';
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tweet: tweet })
                });
                const data = await response.json();
                
                const sentimentClass = data.sentiment === 'positive' ? 'positive' : 
                                       data.sentiment === 'negative' ? 'negative' : 'neutral';
                
                resultDiv.innerHTML = `<div class="result ${sentimentClass}">
                    <strong>Sentiment:</strong> ${data.sentiment.toUpperCase()}<br>
                    <strong>Confidence:</strong> ${data.confidence}%
                </div>`;
            } catch (error) {
                resultDiv.innerHTML = '<div class="result neutral">Error analyzing tweet. Try again!</div>';
            }
        }

        async function loadStats() {
            try {
                const response = await fetch('/stats');
                const data = await response.json();
                document.getElementById('posCount').textContent = data.positive.toLocaleString();
                document.getElementById('neuCount').textContent = data.neutral.toLocaleString();
                document.getElementById('negCount').textContent = data.negative.toLocaleString();
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        loadStats();
    </script>
</body>
</html>
